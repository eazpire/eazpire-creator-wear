# Signiertes AAB → Google Play (Wear app com.eazpire.creator.wear)
#
# Aktivierung (Repo eazpire-creator-wear):
#   Variable ENABLE_GOOGLE_PLAY = true
#   Optional PLAY_DEFAULT_TRACK (wear:internal | wear:alpha | …), PLAY_VERSION_CODE_BASE (optional offset; default 2 + run_number)
#   Wear bundles must use wear:* tracks, not phone "internal" — see Play Console Advanced settings → Wear OS track.
#
# Secrets: PLAY_SERVICE_ACCOUNT_JSON, ANDROID_KEYSTORE_*

name: Google Play (AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play-Track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  upload:
    if: vars.ENABLE_GOOGLE_PLAY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$PLAY_JSON" ]; then echo "::error::Secret PLAY_SERVICE_ACCOUNT_JSON fehlt"; exit 1; fi
          if [ -z "$KS_B64" ]; then echo "::error::Secret ANDROID_KEYSTORE_BASE64 fehlt"; exit 1; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute VERSION_CODE
        run: |
          # Separate Wear package — only must exceed last upload (currently 1). Must fit signed 32-bit int and Play max 2100000000.
          RUN='${{ github.run_number }}'
          BASE='${{ vars.PLAY_VERSION_CODE_BASE }}'
          if [ -n "$BASE" ]; then
            VERSION_CODE=$(( BASE + RUN ))
            echo "Computed VERSION_CODE=$VERSION_CODE (PLAY_VERSION_CODE_BASE=$BASE + run=$RUN)"
          else
            VERSION_CODE=$(( 2 + RUN ))
          fi
          if [ "$VERSION_CODE" -lt 2 ] || [ "$VERSION_CODE" -gt 2100000000 ]; then
            echo "::warning::VERSION_CODE $VERSION_CODE invalid (need 2–2100000000). Ignoring PLAY_VERSION_CODE_BASE; using 2 + run=$RUN."
            VERSION_CODE=$(( 2 + RUN ))
          fi
          echo "Using VERSION_CODE=$VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build release AAB
        env:
          CI: "true"
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: |
          echo "Building with VERSION_CODE=$VERSION_CODE"
          ./gradlew clean bundleRelease --no-daemon --stacktrace -PVERSION_CODE="$VERSION_CODE"

      - name: Verify AAB versionCode
        run: |
          EXPECTED="${{ env.VERSION_CODE }}"
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          rm -rf /tmp/wear-aab && mkdir -p /tmp/wear-aab
          unzip -q app/build/outputs/bundle/release/app-release.aab -d /tmp/wear-aab
          ACTUAL=$("$BUILD_TOOLS"/aapt2 dump xmltree /tmp/wear-aab/base/manifest/AndroidManifest.xml | awk '
            /android:versionCode/ { getline; sub(/.*raw="/, ""); sub(/".*/, ""); print; exit }
          ')
          echo "Expected versionCode=$EXPECTED Actual=$ACTUAL"
          if [ -z "$ACTUAL" ] || [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::AAB versionCode mismatch (expected $EXPECTED, got ${ACTUAL:-empty})"
            exit 1
          fi

      - name: Resolve Wear Play track
        run: |
          RAW='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || vars.PLAY_DEFAULT_TRACK || 'internal' }}'
          case "$RAW" in
            wear:*) PLAY_TRACK="$RAW" ;;
            *) PLAY_TRACK="wear:$RAW" ;;
          esac
          echo "PLAY_TRACK=$PLAY_TRACK" >> "$GITHUB_ENV"
          echo "Using Play track: $PLAY_TRACK"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eazpire.creator.wear
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ env.PLAY_TRACK }}
          status: completed
