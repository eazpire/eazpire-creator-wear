# Signiertes AAB → Google Play (Wear app com.eazpire.creator.wear)
#
# Aktivierung (Repo eazpire-creator-wear):
#   Variable ENABLE_GOOGLE_PLAY = true
#   Optional PLAY_DEFAULT_TRACK (wear:internal | wear:alpha | …), PLAY_VERSION_CODE_BASE (default 3000000000)
#   Wear bundles must use wear:* tracks, not phone "internal" — see Play Console Advanced settings → Wear OS track.
#
# Secrets: PLAY_SERVICE_ACCOUNT_JSON, ANDROID_KEYSTORE_*

name: Google Play (AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play-Track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  upload:
    if: vars.ENABLE_GOOGLE_PLAY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$PLAY_JSON" ]; then echo "::error::Secret PLAY_SERVICE_ACCOUNT_JSON fehlt"; exit 1; fi
          if [ -z "$KS_B64" ]; then echo "::error::Secret ANDROID_KEYSTORE_BASE64 fehlt"; exit 1; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute VERSION_CODE
        run: |
          BASE='${{ vars.PLAY_VERSION_CODE_BASE }}'
          if [ -z "$BASE" ]; then BASE=3000000000; fi
          echo "VERSION_CODE=$(( BASE + ${{ github.run_number }} ))" >> "$GITHUB_ENV"
          echo "Using VERSION_CODE=$(( BASE + ${{ github.run_number }} )) (BASE=$BASE + run=${{ github.run_number }})"

      - name: Build release AAB
        env:
          CI: "true"
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Resolve Wear Play track
        run: |
          RAW='${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || vars.PLAY_DEFAULT_TRACK || 'internal' }}'
          case "$RAW" in
            wear:*) PLAY_TRACK="$RAW" ;;
            *) PLAY_TRACK="wear:$RAW" ;;
          esac
          echo "PLAY_TRACK=$PLAY_TRACK" >> "$GITHUB_ENV"
          echo "Using Play track: $PLAY_TRACK"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eazpire.creator.wear
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ env.PLAY_TRACK }}
          status: completed
